[phases.setup]
nixPkgs = [
    "php84",
    "php84Extensions.intl",
    "php84Extensions.zip",
    "php84Extensions.mbstring",
    "php84Extensions.bcmath",
    "php84Extensions.pdo_mysql",
]

[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-dev"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"